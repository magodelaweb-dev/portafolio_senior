<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder: sesión de mentoría</title>
  <desc id="desc">Ilustración provisional de una persona guiando a otra frente a una pizarra con anotaciones técnicas, representando charlas y mentorías de onboarding.</desc>
  <rect width="800" height="500" fill="#f8fafc"/>

  <rect x="230" y="90" width="400" height="230" rx="8" fill="#fefce8" stroke="#d6d3d1" stroke-width="3"/>
  <g stroke="#facc15" stroke-width="3" fill="none">
    <path d="M270 140 L 340 140 L 340 190 L 400 190"/>
    <circle cx="270" cy="140" r="6" fill="#facc15" stroke="none"/>
    <circle cx="400" cy="190" r="6" fill="#facc15" stroke="none"/>
  </g>
  <g font-family="monospace" font-size="14" fill="#a16207">
    <text x="440" y="150">onboarding()</text>
    <text x="440" y="175">mentoria(persona)</text>
  </g>
  <line x1="270" y1="230" x2="560" y2="230" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="270" y1="260" x2="500" y2="260" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="270" y1="290" x2="530" y2="290" stroke="#e2e8f0" stroke-width="2"/>

  <g transform="translate(160,320)">
    <circle cx="0" cy="0" r="26" fill="#4f46e5"/>
    <path d="M -30 70 Q 0 20 30 70 Z" fill="#4f46e5"/>
  </g>
  <text x="160" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">mentor</text>

  <g transform="translate(560,335)">
    <circle cx="0" cy="0" r="22" fill="#0d9488"/>
    <path d="M -26 62 Q 0 18 26 62 Z" fill="#0d9488"/>
  </g>
  <text x="560" y="420" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#64748b">nuevo ingreso</text>

  <g transform="translate(660,335)">
    <circle cx="0" cy="0" r="22" fill="#0d9488" opacity="0.7"/>
    <path d="M -26 62 Q 0 18 26 62 Z" fill="#0d9488" opacity="0.7"/>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#64748b">charlas y mentorías</text>
</svg>
