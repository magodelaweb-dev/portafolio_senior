<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder: desarrollo con agentes de IA</title>
  <desc id="desc">Ilustración provisional de una terminal de desarrollo con varios agentes de IA trabajando en paralelo sobre distintas tareas del mismo proyecto.</desc>
  <rect width="800" height="500" fill="#0f172a"/>

  <rect x="50" y="60" width="700" height="380" rx="10" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="82" cy="88" r="6" fill="#ef4444"/>
  <circle cx="104" cy="88" r="6" fill="#f59e0b"/>
  <circle cx="126" cy="88" r="6" fill="#22c55e"/>
  <text x="400" y="93" text-anchor="middle" font-family="monospace" font-size="13" fill="#64748b">portafolio_senior — 3 agentes activos</text>
  <line x1="50" y1="110" x2="750" y2="110" stroke="#1e293b" stroke-width="2"/>

  <g font-family="monospace" font-size="13">
    <rect x="70" y="130" width="660" height="80" rx="6" fill="#111827" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="90" cy="150" r="5" fill="#38bdf8"/>
    <text x="105" y="155" fill="#93c5fd">agente-1</text>
    <text x="190" y="155" fill="#64748b">refactor: extraer Ops::MetricsCollector</text>
    <rect x="90" y="168" width="500" height="6" rx="3" fill="#1e293b"/>
    <rect x="90" y="168" width="380" height="6" rx="3" fill="#38bdf8"/>
    <text x="90" y="196" fill="#475569">app/services/ops/metrics_collector.rb</text>

    <rect x="70" y="220" width="660" height="80" rx="6" fill="#111827" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="90" cy="240" r="5" fill="#a78bfa"/>
    <text x="105" y="245" fill="#c4b5fd">agente-2</text>
    <text x="190" y="245" fill="#64748b">test: cobertura para Telemetry ring buffer</text>
    <rect x="90" y="258" width="500" height="6" rx="3" fill="#1e293b"/>
    <rect x="90" y="258" width="220" height="6" rx="3" fill="#a78bfa"/>
    <text x="90" y="286" fill="#475569">test/models/telemetry_test.rb</text>

    <rect x="70" y="310" width="660" height="80" rx="6" fill="#111827" stroke="#34d399" stroke-width="1.5"/>
    <circle cx="90" cy="330" r="5" fill="#34d399"/>
    <text x="105" y="335" fill="#6ee7b7">agente-3</text>
    <text x="190" y="335" fill="#64748b">docs: actualizar README con panel /ops</text>
    <rect x="90" y="348" width="500" height="6" rx="3" fill="#1e293b"/>
    <rect x="90" y="348" width="500" height="6" rx="3" fill="#34d399"/>
    <text x="90" y="376" fill="#6ee7b7">✓ completado</text>
  </g>

  <text x="400" y="470" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#94a3b8">desarrollo asistido por agentes de IA en paralelo</text>
